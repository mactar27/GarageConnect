<div class="max-w-7xl mx-auto space-y-6">
  
  <!-- Financial Summary Header -->
  <div class="bg-gradient-to-br from-gray-900 to-gray-800 rounded-[2rem] shadow-xl p-8 sm:p-10 relative overflow-hidden">
    <!-- Decorative background elements -->
    <div class="absolute -right-20 -top-20 w-64 h-64 bg-blue-500 rounded-full mix-blend-screen filter blur-3xl opacity-20"></div>
    <div class="absolute right-20 -bottom-20 w-64 h-64 bg-indigo-500 rounded-full mix-blend-screen filter blur-3xl opacity-20"></div>
    
    <div class="relative z-10 flex flex-col md:flex-row md:items-center justify-between gap-6">
      <div>
        <p class="text-gray-400 font-medium mb-1 flex items-center">
          <svg class="w-4 h-4 mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
          Solde total à payer
        </p>
        <h2 class="text-4xl sm:text-5xl font-extrabold text-white tracking-tight">85 000 <span class="text-2xl text-gray-400 font-bold">FCFA</span></h2>
      </div>
      
      <div class="flex flex-col sm:flex-row gap-3">
        <button class="bg-white/10 hover:bg-white/20 text-white font-bold py-3 px-6 rounded-xl backdrop-blur-md border border-white/10 transition-all">
          Gérer les moyens de paiement
        </button>
        <button class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-xl shadow-lg shadow-blue-600/30 transition-all flex items-center justify-center">
          <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
          Payer maintenant
        </button>
      </div>
    </div>
  </div>

  <!-- Filters & List Header -->
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 pt-4">
    <h3 class="text-xl font-bold text-gray-900">Historique des factures</h3>
    
    <div class="flex bg-gray-100/80 p-1 rounded-xl w-fit">
      <button (click)="setFilter('TOUT')" [class.bg-white]="activeFilter === 'TOUT'" [class.shadow-sm]="activeFilter === 'TOUT'" [class.text-gray-900]="activeFilter === 'TOUT'" [class.text-gray-500]="activeFilter !== 'TOUT'" class="px-4 py-1.5 rounded-lg text-sm font-semibold transition-all">Toutes</button>
      <button (click)="setFilter('EN_ATTENTE')" [class.bg-white]="activeFilter === 'EN_ATTENTE'" [class.shadow-sm]="activeFilter === 'EN_ATTENTE'" [class.text-orange-600]="activeFilter === 'EN_ATTENTE'" [class.text-gray-500]="activeFilter !== 'EN_ATTENTE'" class="px-4 py-1.5 rounded-lg text-sm font-semibold transition-all flex items-center">
        En attente
        <span *ngIf="activeFilter === 'EN_ATTENTE'" class="ml-1.5 flex h-2 w-2 relative"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-orange-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-orange-500"></span></span>
      </button>
      <button (click)="setFilter('PAYEE')" [class.bg-white]="activeFilter === 'PAYEE'" [class.shadow-sm]="activeFilter === 'PAYEE'" [class.text-green-600]="activeFilter === 'PAYEE'" [class.text-gray-500]="activeFilter !== 'PAYEE'" class="px-4 py-1.5 rounded-lg text-sm font-semibold transition-all">Payées</button>
    </div>
  </div>

  <!-- Invoices List -->
  <div class="space-y-4">
    <div *ngFor="let inv of filteredInvoices" class="bg-white rounded-2xl shadow-sm border border-gray-100 p-5 sm:p-6 flex flex-col lg:flex-row lg:items-center justify-between gap-5 hover:shadow-md transition-shadow group">
      
      <div class="flex items-center space-x-4 flex-1">
        <div class="w-12 h-12 rounded-full bg-gray-50 flex items-center justify-center flex-shrink-0 border border-gray-100 group-hover:bg-blue-50 transition-colors">
          <svg class="w-6 h-6 text-gray-400 group-hover:text-blue-600 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
        </div>
        <div>
          <h4 class="font-bold text-gray-900 flex items-center gap-2">
            {{ inv.service }}
            <span *ngIf="inv.status === 'EN_ATTENTE'" class="px-2 py-0.5 rounded text-[10px] font-bold bg-orange-100 text-orange-700 border border-orange-200 uppercase tracking-wider">À régler</span>
            <span *ngIf="inv.status === 'PAYEE'" class="px-2 py-0.5 rounded text-[10px] font-bold bg-green-100 text-green-700 border border-green-200 uppercase tracking-wider">Payée</span>
          </h4>
          <p class="text-sm text-gray-500 flex items-center mt-1">
            <span class="font-medium text-gray-600 mr-3">{{ inv.id }}</span>
            <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            {{ inv.date }}
            <span class="mx-2 text-gray-300">•</span>
            <svg class="w-3.5 h-3.5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
            {{ inv.garage }}
          </p>
        </div>
      </div>

      <div class="flex items-center justify-between lg:justify-end gap-6 w-full lg:w-auto mt-4 lg:mt-0 pt-4 lg:pt-0 border-t lg:border-t-0 border-gray-100">
        <div class="text-right">
          <p class="text-xs font-medium text-gray-500 uppercase tracking-wider mb-0.5">Montant</p>
          <p class="text-xl font-bold text-gray-900">{{ inv.amount }}</p>
        </div>
        <button class="p-2.5 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-xl transition-colors border border-transparent hover:border-blue-100" title="Télécharger en PDF">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        </button>
      </div>
      
    </div>

    <!-- Empty State fallback -->
    <div *ngIf="filteredInvoices.length === 0" class="border-2 border-dashed border-gray-200 rounded-2xl p-16 text-center bg-gray-50/50">
      <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mx-auto mb-5 shadow-sm border border-gray-100">
        <svg class="w-10 h-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path></svg>
      </div>
      <h3 class="text-xl font-bold text-gray-900 mb-2">Aucune facture trouvée</h3>
      <p class="text-gray-500 max-w-sm mx-auto font-medium">Vous n'avez aucune facture correspondant à ce filtre.</p>
    </div>

  </div>
</div>
