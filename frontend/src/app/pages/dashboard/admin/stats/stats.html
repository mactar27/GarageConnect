<div class="max-w-6xl mx-auto space-y-6">
  <div>
    <h2 class="text-2xl font-bold text-gray-800">Statistiques globales</h2>
    <p class="text-sm text-gray-500 mt-1">Vue d'ensemble de l'activité sur la plateforme GarageConnect.</p>
  </div>

  <div *ngIf="loading" class="flex justify-center py-12">
    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
  </div>

  <div *ngIf="!loading" class="grid grid-cols-1 md:grid-cols-3 gap-6">
    
    <!-- Total Utilisateurs -->
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center">
      <div class="w-14 h-14 bg-indigo-50 rounded-2xl flex items-center justify-center text-indigo-600 mr-5">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
      </div>
      <div>
        <p class="text-sm font-medium text-gray-500">Total Utilisateurs</p>
        <p class="text-3xl font-bold text-gray-900">{{ stats.totalUtilisateurs }}</p>
      </div>
    </div>

    <!-- Total Garages -->
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center">
      <div class="w-14 h-14 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-600 mr-5">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
      </div>
      <div>
        <p class="text-sm font-medium text-gray-500">Garages inscrits</p>
        <p class="text-3xl font-bold text-gray-900">{{ stats.totalGarages }}</p>
      </div>
    </div>

    <!-- Total Demandes -->
    <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 flex items-center">
      <div class="w-14 h-14 bg-amber-50 rounded-2xl flex items-center justify-center text-amber-600 mr-5">
        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
      </div>
      <div>
        <p class="text-sm font-medium text-gray-500">Demandes de réparation</p>
        <p class="text-3xl font-bold text-gray-900">{{ stats.totalDemandes }}</p>
      </div>
    </div>

  </div>
</div>
