<div class="max-w-3xl mx-auto space-y-6">
  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 sm:p-10">
    <h2 class="text-2xl font-bold text-gray-900 mb-2">Nouvelle demande de réparation</h2>
    <p class="text-gray-500 mb-8">Remplissez ce formulaire pour soumettre une nouvelle demande à un garage.</p>
    
    <form class="space-y-6">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Véhicule concerné</label>
        <select class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition-colors bg-white text-gray-900">
          <option value="">Sélectionnez un véhicule...</option>
          <option value="new">+ Ajouter un nouveau véhicule</option>
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1.5">Description du problème</label>
        <textarea rows="4" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition-colors bg-white text-gray-900" placeholder="Décrivez les symptômes ou les réparations nécessaires..."></textarea>
      </div>

      <div class="pt-4">
        <button type="button" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg shadow-sm transition-colors duration-200">
          Soumettre la demande
        </button>
      </div>
    </form>
  </div>
</div>
